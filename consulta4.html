<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Consulta IV - Histórico Completo</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; color: #333; }
        .container { max-width: 1100px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        .filtros-flex { display: flex; gap: 20px; margin-bottom: 25px; }
        
        .grupo-filtro { 
            flex: 1; 
            background: #f9f9f9; 
            padding: 15px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
        }

        .lista-scroll { 
            max-height: 150px; 
            overflow-y: auto; 
            background: white; 
            border: 1px solid #eee; 
            padding: 10px; 
            margin-top: 8px; 
            border-radius: 4px;
        }

        .item-check { display: block; margin-bottom: 6px; font-size: 13px; cursor: pointer; }
        .item-check input { margin-right: 8px; }
        .master-label { border-bottom: 1px solid #ddd; padding-bottom: 8px; margin-bottom: 5px; color: #1e3d1a; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #1e3d1a; color: white; padding: 12px; text-align: left; position: sticky; top: 0; }
        td { padding: 12px; border-bottom: 1px solid #ddd; }
        tr:hover { background: #f1f1f1; }

        .btn-back { display: inline-block; margin-bottom: 20px; text-decoration: none; color: #54a04a; font-weight: bold; }
        h3 { margin: 0; font-size: 15px; color: #1e3d1a; }
        .no-data { text-align: center; padding: 40px; color: #888; }

        strong {color: #1e3d1a; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="btn-back">← Voltar ao Menu</a>
    <h2>Evolução Cronológica de Preços</h2>
    
    <div class="filtros-flex">
        <div class="grupo-filtro">
            <h3>Filtro de Postos</h3>
            <div class="lista-scroll">
                <label class="item-check master-label">
                    <input type="checkbox" id="allPostos" checked onclick="toggleTodos('posto')"> <strong>Selecionar Todos</strong>
                </label>
                <div id="listaPostos"></div>
            </div>
        </div>

        <div class="grupo-filtro">
            <h3>Tipo de Combustível</h3>
            <div class="lista-scroll">
                <label class="item-check master-label">
                    <input type="checkbox" id="allCombs" checked onclick="toggleTodos('comb')"> <strong>Selecionar Todos</strong>
                </label>
                <div id="listaCombs"></div>
            </div>
        </div>
    </div>

    <table id="tabela">
        <thead>
            <tr>
                <th>Data</th>
                <th>Posto</th>
                <th>Combustível</th>
                <th>Valor</th>
            </tr>
        </thead>
        <tbody id="corpoTabela"></tbody>
    </table>
</div>

<script>
        let globalData = [];

        function formatarDataBR(dataString) {
            if(!dataString) return ""; 
            const data = new Date(dataString);
            data.setMinutes(data.getMinutes() + data.getTimezoneOffset());
            return data.toLocaleDateString('pt-BR');
        }

        async function iniciar() {
            const resp = await fetch('./dados site.csv');
            const texto = await resp.text();
            const linhas = texto.split('\n').filter(l => l.trim() !== '');
            globalData = linhas.slice(1).map(l => {
                const cols = l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return {
                    nome: cols[0].replace(/"/g, ''),
                    comb: cols[1].replace(/"/g, ''),
                    data: cols[4].replace(/"/g, ''),
                    valor: parseFloat(cols[5].replace(/"/g, '').replace(',', '.'))
                };
            });
            gerarCheckboxes();
            atualizar();
        }

        function gerarCheckboxes() {
            const postos = [...new Set(globalData.map(d => d.nome))].sort();
            const combs = [...new Set(globalData.map(d => d.comb))].sort();
            const dP = document.getElementById('listaPostos');
            const dC = document.getElementById('listaCombs');
            postos.forEach(p => dP.innerHTML += `<label class="item-check"><input type="checkbox" class="check-posto" value="${p}" checked onclick="verificarMaster('posto')"> ${p}</label>`);
            combs.forEach(c => dC.innerHTML += `<label class="item-check"><input type="checkbox" class="check-comb" value="${c}" checked onclick="verificarMaster('comb')"> ${c}</label>`);
        }

        function toggleTodos(tipo) {
            const m = document.getElementById(tipo === 'posto' ? 'allPostos' : 'allCombs');
            const e = document.querySelectorAll(tipo === 'posto' ? '.check-posto' : '.check-comb');
            e.forEach(cb => cb.checked = m.checked);
            atualizar();
        }

        function verificarMaster(tipo) {
            const m = document.getElementById(tipo === 'posto' ? 'allPostos' : 'allCombs');
            const e = document.querySelectorAll(tipo === 'posto' ? '.check-posto' : '.check-comb');
            m.checked = Array.from(e).every(cb => cb.checked);
            atualizar();
        }

        function atualizar() {
            const pSel = Array.from(document.querySelectorAll('.check-posto:checked')).map(cb => cb.value);
            const cSel = Array.from(document.querySelectorAll('.check-comb:checked')).map(cb => cb.value);
            const tbody = document.getElementById('corpoTabela');
            tbody.innerHTML = '';

            const filtrados = globalData.filter(d => pSel.includes(d.nome) && cSel.includes(d.comb));
            filtrados.sort((a, b) => new Date(a.data) - new Date(b.data));

            filtrados.forEach(f => {
                tbody.innerHTML += `<tr><td>${formatarDataBR(f.data)}</td><td>${f.nome}</td><td>${f.comb}</td><td><strong>R$ ${f.valor.toFixed(2).replace('.',',')}</strong></td></tr>`;
            });
        }
        iniciar();
    </script>
</body>
</html>
